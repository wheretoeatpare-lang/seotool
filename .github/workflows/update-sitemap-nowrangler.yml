name: Auto-Update Sitemap NO Wrangler

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      # 1. Me grab repo with big stick
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Me set up Node rock tool
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Me make sitemap fire
      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.js

      # 4. Me push sitemap back to cave wall (git)
      - name: Commit updated sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: auto-update sitemap.xml [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      # 5. Me yell at Google (also covers Gemini AI search!)
      #    Me yell at Bing (also covers DuckDuckGo!)
      - name: Ping Google and Bing
        run: |
          echo "Pinging Google (also covers Gemini AI search)..."
          curl -s "https://www.google.com/ping?sitemap=https://ranksorcery.com/sitemap.xml" && echo " ✓ Google + Gemini AI covered"

          echo "Pinging Bing (also covers DuckDuckGo)..."
          curl -s "https://www.bing.com/ping?sitemap=https://ranksorcery.com/sitemap.xml" && echo " ✓ Bing + DuckDuckGo covered"

      # 6. Me use magic IndexNow rock!
      - name: Ping IndexNow (multi-engine one-shot)
        run: |
          echo "Pinging IndexNow (covers Bing, Yandex, Naver, Seznam...)..."
          curl -s "https://api.indexnow.org/indexnow?url=https://ranksorcery.com/sitemap.xml&key=${{ secrets.INDEXNOW_KEY }}" && echo " ✓ IndexNow multi-engine pinged"
